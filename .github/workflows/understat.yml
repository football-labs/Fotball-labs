name: Understat Scrape

on:
  schedule:
    # Every Wednesday at 06:00 UTC
    - cron: '0 6 * * 3'
  workflow_dispatch:
    inputs:
      season:
        description: 'Season start year (e.g. 2024 for 2024/25)'
        required: false
        default: '2024'

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas

      - name: Run scraper
        run: |
          SEASON="${{ github.event.inputs.season || '2024' }}"
          python scrape_understat.py --season "$SEASON"

      - name: Commit and push results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update understat data $(date -u '+%Y-%m-%d')"
            git push
          fi
